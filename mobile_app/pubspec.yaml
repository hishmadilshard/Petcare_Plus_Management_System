name: petcare_plus
description: PetCare Plus - Veterinary Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── HTTP & Storage ──────────────────────────────
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # ── State Management ────────────────────────────
  provider: ^6.1.1

  # ── Firebase ────────────────────────────────────
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # ── QR Code ─────────────────────────────────────
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # ── UI Helpers ──────────────────────────────────
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: TimesNewRoman
      fonts:
        - asset: assets/fonts/times_new_roman.ttf
        - asset: assets/fonts/times_new_roman_bold.ttf
          weight: 700
        - asset: assets/fonts/times_new_roman_italic.ttf
          style: italic